<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="calculator-container">
        <h1 class="calculator-display">0</h1>
        <button class="calculator-btn clear">C</button>
        <button class="calculator-btn erase">←</button>
        <button class="calculator-btn operation division">÷</button>

        <button class="calculator-btn num">7</button>
        <button class="calculator-btn num">8</button>
        <button class="calculator-btn num">9</button>
        <button class="calculator-btn operation multiplication">x</button>

        <button class="calculator-btn num">4</button>
        <button class="calculator-btn num">5</button>
        <button class="calculator-btn num">6</button>
        <button class="calculator-btn operation subtraction">-</button>

        <button class="calculator-btn num">1</button>
        <button class="calculator-btn num">2</button>
        <button class="calculator-btn num">3</button>
        <button class="calculator-btn operation addition">+</button>

        <button class="calculator-btn num zero-btn">0</button>
        <button class="calculator-btn equals">=</button>
    </div>
    <script src="./calculator.js"></script>
</body>
</html>
